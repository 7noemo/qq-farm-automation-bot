name: Sync Fork and Trigger Docker Build

on:
  schedule:
    - cron: '*/30 * * * *'  # 可根据需求调整执行频率
  workflow_dispatch:        # 支持手动触发

env:
  UPSTREAM_REPO: XyhTender/qq-farm-automation-bot  # 替换为你的上游仓库
  UPSTREAM_BRANCH: main
  LOCAL_BRANCH: main

jobs:
  sync-fork-and-extract-tag:
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.extract_tag.outputs.new_tag }}
    steps:
      # 1. 检出当前仓库代码
      - name: Checkout local repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.TOKEN }}
          fetch-depth: 0

      # 2. 配置 Git 身份（用于提交同步代码）
      - name: Configure Git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      # 3. 添加上游仓库并检查是否需要同步
      - name: Check upstream for updates
        id: check_sync
        run: |
          # 添加上游远程仓库（避免重复添加报错）
          git remote add upstream https://github.com/${{ env.UPSTREAM_REPO }}.git 2>/dev/null || true
          git fetch upstream

          # 对比本地和上游分支的提交哈希
          LOCAL_COMMIT=$(git rev-parse ${{ env.LOCAL_BRANCH }})
          UPSTREAM_COMMIT=$(git rev-parse upstream/${{ env.UPSTREAM_BRANCH }})

          # 核心判断：无更新则失败退出
          if [ "$LOCAL_COMMIT" = "$UPSTREAM_COMMIT" ]; then
            echo "❌ No updates from upstream repository. Exiting with failure."
            exit 1
          else
            echo "✅ Upstream has updates. Preparing to sync."
            echo "need_sync=true" >> $GITHUB_OUTPUT
          fi

      # 4. 同步上游代码到本地仓库
      - name: Sync upstream changes
        if: steps.check_sync.outputs.need_sync == 'true'
        run: |
          git pull -X theirs upstream ${{ env.UPSTREAM_BRANCH }}
          git push origin ${{ env.LOCAL_BRANCH }}

      # 5. 提取 Update.log 中的日期作为版本号（格式：2026/03/12 → 2026-03-12）
      - name: Extract tag from Update.log
        id: extract_tag
        if: steps.check_sync.outputs.need_sync == 'true'
        run: |
          LOG_FILE="./Update.log"
          
          # 检查 Update.log 是否存在
          if [ ! -f "$LOG_FILE" ]; then
            echo "❌ Update.log not found in root directory. Exiting with failure."
            exit 1
          fi

          # 读取第一行并提取日期（匹配 "更新日志 2026/03/12" 格式）
          FIRST_LINE=$(head -n 1 "$LOG_FILE")
          RAW_DATE=$(echo "$FIRST_LINE" | grep -oE '[0-9]{4}/[0-9]{2}/[0-9]{2}' | head -1)

          # 校验日期是否提取成功
          if [ -z "$RAW_DATE" ]; then
            echo "❌ No valid date found in Update.log first line. Exiting with failure."
            exit 1
          fi

          # 将 / 替换为 - 生成最终版本号（2026/03/12 → 2026-03-12）
          NEW_TAG=$(echo "$RAW_DATE" | tr '/' '-')
          echo "✅ Extracted tag: $NEW_TAG"
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT

  # 6. 触发 docker-image.yml 工作流（仅同步成功且提取标签成功时执行）
  trigger-docker-workflow:
    needs: sync-fork-and-extract-tag
    if: needs.sync-fork-and-extract-tag.outcome == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger docker-image.yml with extracted tag
        run: |
          # 构造 API 请求触发工作流
          curl -L -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/docker-image.yml/dispatches \
            -d "{\"ref\":\"${{ env.LOCAL_BRANCH }}\",\"inputs\":{\"custom_tag\":\"${{ needs.sync-fork-and-extract-tag.outputs.new_tag }}\"}}"
