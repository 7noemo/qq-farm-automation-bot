name: Sync Upstream and Trigger Docker Build

on:
  schedule:
    - cron: '0 * * * *'  # 每小时一次 (UTC 时间)
  workflow_dispatch:     # 允许手动触发测试

jobs:
  sync-and-extract:
    runs-on: ubuntu-latest
    outputs:
      extracted_tag: ${{ steps.extract.outputs.tag }}
      should_trigger: ${{ steps.check.outputs.should_trigger }}
    steps:
      - name: Checkout your fork (main branch)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.TOKEN }}

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/XyhTender/qq-farm-automation-bot.git || echo "Remote already exists"
          git fetch upstream main

      - name: Merge upstream changes (Preserve local files)
        id: check
        run: |
          # 配置用户信息
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # 尝试合并 upstream/main 到当前 main
          if git merge upstream/main --no-edit; then
            echo "✅ Merge successful! Local files preserved."
            
            # 检查是否生成了新的 merge commit
            LAST_MSG=$(git log -1 --pretty=%B)
            if [[ "$LAST_MSG" == *"Merge branch"* || "$LAST_MSG" == *"Merge remote-tracking branch"* ]]; then
              echo "Changes detected after merge."
              echo "should_trigger=true" >> $GITHUB_OUTPUT
              
              # 使用 token 直接推送（更可靠）
              git push "https://${{ secrets.TOKEN }}@github.com/7noemo/qq-farm-automation-bot.git" main
              echo "✅ Pushed merged changes to origin."
            else
              echo "No new commits to merge (already up to date)."
              echo "should_trigger=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "❌ Merge conflict or error occurred!"
            echo "Automatic merge failed. Please resolve conflicts manually."
            echo "should_trigger=false" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Extract date from Update.log as version tag
        id: extract
        if: steps.check.outputs.should_trigger == 'true'
        run: |
          LOG_FILE="Update.log"
          if [ ! -f "$LOG_FILE" ]; then
            # 尝试在 core/ 目录下查找（兼容不同项目结构）
            if [ -f "./core/Update.log" ]; then
              LOG_FILE="./core/Update.log"
            else
              echo "ERROR: Update.log not found in root or ./core/"
              exit 1
            fi
          fi
          
          FIRST_LINE=$(head -n 1 "$LOG_FILE")
          echo "First line of Update.log: $FIRST_LINE"
          
          # 提取 YYYY/MM/DD 格式的日期
          DATE_RAW=$(echo "$FIRST_LINE" | grep -o '[0-9]\{4\}/[0-9]\{2\}/[0-9]\{2\}')
          
          if [ -z "$DATE_RAW" ]; then
            echo "WARNING: Could not extract date from Update.log. Using 'latest'."
            echo "tag=latest" >> $GITHUB_OUTPUT
          else
            # 转换为 YYYY-MM-DD
            FORMATTED_DATE=$(echo "$DATE_RAW" | sed 's/\//\-/g')
            echo "Extracted and formatted date: $FORMATTED_DATE"
            echo "tag=$FORMATTED_DATE" >> $GITHUB_OUTPUT
          fi

  trigger-docker:
    needs: sync-and-extract
    if: needs.sync-and-extract.outputs.should_trigger == 'true'
    uses: ./.github/workflows/docker-image.yml
    with:
      version_tag: ${{ needs.sync-and-extract.outputs.extracted_tag }}
    secrets: inherit
