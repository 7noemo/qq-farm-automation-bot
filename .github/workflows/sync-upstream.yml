name: Compare Files and Trigger Build

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

env:
  UPSTREAM_REPO: XyhTender/qq-farm-automation-bot
  UPSTREAM_BRANCH: main
  LOCAL_BRANCH: main

jobs:
  compare-and-trigger:
    runs-on: ubuntu-latest
    outputs:
      should_proceed: ${{ steps.compare_files.outputs.should_proceed }}
      new_tag: ${{ steps.extract_tag.outputs.new_tag || '' }}
    steps:
      - name: Checkout current repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.TOKEN }}
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Clone upstream repository to a temporary directory
        run: |
          git clone --depth 1 --branch ${{ env.UPSTREAM_BRANCH }} "https://github.com/${{ env.UPSTREAM_REPO }}.git" /tmp/upstream_repo

      - name: Compare file contents between local and upstream
        id: compare_files
        run: |
          # Use rsync to perform a dry-run comparison of file contents.
          # This is more accurate than comparing commit SHAs.
          # It compares actual file content and structure.
          if rsync -rn --delete --exclude='.git' ./ /tmp/upstream_repo/; then
            # If rsync reports no differences, no files have changed
            echo "No file changes detected compared to upstream repository."
            echo "should_proceed=false" >> $GITHUB_OUTPUT
            exit 0
          else
            # If rsync reports differences, files have changed
            echo "File changes detected compared to upstream repository. Proceeding."
            echo "should_proceed=true" >> $GITHUB_OUTPUT
          fi

      - name: Sync upstream changes into local repository
        if: steps.compare_files.outputs.should_proceed == 'true'
        run: |
          git remote add upstream https://github.com/${{ env.UPSTREAM_REPO }}.git
          git fetch upstream
          git pull -X theirs upstream ${{ env.UPSTREAM_BRANCH }}

      - name: Push merged changes to local main branch
        if: steps.compare_files.outputs.should_proceed == 'true'
        run: git push origin ${{ env.LOCAL_BRANCH }}

      - name: Extract tag from Update.log (root directory)
        id: extract_tag
        if: steps.compare_files.outputs.should_proceed == 'true'
        run: |
          LOG_FILE="./Update.log"
          
          echo "Current working directory: $(pwd)"
          echo "Files in current directory:"
          ls -la
          
          if [ -f "$LOG_FILE" ]; then
            echo "Update.log file found at path: $LOG_FILE"
            NEW_TAG=$(head -n 1 "$LOG_FILE" | grep -oE '[0-9]{4}/[0-9]{2}/[0-9]{2}' | head -1)
            
            if [ -n "$NEW_TAG" ]; then
              echo "Extracted tag from Update.log: $NEW_TAG"
              echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT
            else
              echo "No valid date format (YYYY/MM/DD) found in Update.log"
              echo "new_tag=unknown" >> $GITHUB_OUTPUT
            fi
          else
            echo "Error: Update.log file not found in root directory"
            echo "new_tag=no_log" >> $GITHUB_OUTPUT
          fi
          
      - name: Print sync summary
        if: steps.compare_files.outputs.should_proceed == 'true'
        run: |
          echo "Repository synced with upstream. Triggering build with tag: ${{ steps.extract_tag.outputs.new_tag }}"

  trigger-docker-build:
    needs: compare-and-trigger
    if: needs.compare-and-trigger.result == 'success' && needs.compare-and-trigger.outputs.should_proceed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Docker Build Workflow
        if: ${{ needs.compare-and-trigger.outputs.new_tag != '' && needs.compare-and-trigger.outputs.new_tag != 'no_log' && needs.compare-and-trigger.outputs.new_tag != 'unknown' }}
        run: |
          echo "Attempting to trigger docker-image.yml with tag: ${{ needs.compare-and-trigger.outputs.new_tag }}"
          curl -X POST \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: token ${{ secrets.TOKEN }}" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/docker-image.yml/dispatches \
            -d '{"ref":"${{ github.ref_name }}","inputs":{"custom_tag":"${{ needs.compare-and-trigger.outputs.new_tag }}"}}'
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN }}
      - name: Log if no tag was available to trigger
        if: ${{ needs.compare-and-trigger.outputs.new_tag == '' || needs.compare-and-trigger.outputs.new_tag == 'no_log' || needs.compare-and-trigger.outputs.new_tag == 'unknown' }}
        run: |
          echo "Warning: No valid tag was extracted (${TAG}), so the Docker build workflow was not triggered." 
        env:
          TAG: ${{ needs.compare-and-trigger.outputs.new_tag }}
