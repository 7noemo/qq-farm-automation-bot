name: Sync Upstream and Trigger Build

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

env:
  UPSTREAM_REPO: XyhTender/qq-farm-automation-bot
  UPSTREAM_BRANCH: main
  LOCAL_BRANCH: main

jobs:
  sync-and-trigger:
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.extract_tag.outputs.new_tag }}
    steps:
      - name: Checkout current repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.TOKEN }}
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/${{ env.UPSTREAM_REPO }}.git
          git remote set-branches upstream '*'

      - name: Fetch upstream changes
        run: git fetch upstream

      - name: Check for updates
        id: check
        run: |
          LOCAL_SHA=$(git rev-parse HEAD)
          REMOTE_SHA=$(git rev-parse upstream/${{ env.UPSTREAM_BRANCH }})
          
          if [ "$LOCAL_SHA" != "$REMOTE_SHA" ]; then
            echo "Changes detected. Local SHA: $LOCAL_SHA, Remote SHA: $REMOTE_SHA"
            echo "updates_available=true" >> $GITHUB_OUTPUT
          else
            echo "No changes detected. Exiting early."
            echo "::notice title=Sync Check::No updates found from upstream repository."
            exit 0
          fi

      - name: Merge upstream changes (preferring upstream on conflicts)
        if: steps.check.outputs.updates_available == 'true'
        run: |
          git pull -X theirs upstream $UPSTREAM_BRANCH

      - name: Push merged changes to local main branch
        if: steps.check.outputs.updates_available == 'true'
        run: git push origin ${{ env.LOCAL_BRANCH }}

      - name: Extract tag from Update.log
        id: extract_tag
        if: steps.check.outputs.updates_available == 'true'
        run: |
          if [ -f "Update.log" ]; then
            NEW_TAG=$(head -n 1 Update.log | grep -oE '[0-9]{4}/[0-9]{2}/[0-9]{2}' | head -1)
            if [ -n "$NEW_TAG" ]; then
              echo "Extracted tag from Update.log: $NEW_TAG"
              echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT
            else
              echo "No valid date found in Update.log, using 'unknown' as tag."
              echo "new_tag=unknown" >> $GITHUB_OUTPUT
            fi
          else
            echo "Update.log file not found, using 'no_log' as tag."
            echo "new_tag=no_log" >> $GITHUB_OUTPUT
          fi
          
      - name: Print sync summary
        if: steps.check.outputs.updates_available == 'true'
        run: |
          echo "Repository synced with upstream using 'theirs' strategy on conflicts."
          echo "Triggering build with tag: ${{ steps.extract_tag.outputs.new_tag }}"

  trigger-docker-build:
    needs: sync-and-trigger
    if: always() && needs.sync-and-trigger.result == 'success' && needs.sync-and-trigger.outputs.new_tag != ''
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Docker Build Workflow
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: token ${{ secrets.TOKEN }}" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/docker-image.yml/dispatches \
            -d '{"ref":"${{ github.ref_name }}","inputs":{"custom_tag":"${{ needs.sync-and-trigger.outputs.new_tag }}"}}'
