name: Sync Upstream and Trigger Docker Build

on:
  schedule:
    - cron: '0 * * * *'  # 每小时一次 (UTC 时间)
  workflow_dispatch:     # 允许手动触发测试

jobs:
  sync-and-extract:
    runs-on: ubuntu-latest
    outputs:
      extracted_tag: ${{ steps.extract.outputs.tag }}
      should_trigger: ${{ steps.check.outputs.should_trigger }}
    steps:
      - name: Checkout your fork (main branch)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.TOKEN }}

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/XyhTender/qq-farm-automation-bot.git || echo "Remote already exists"
          git fetch upstream main

      - name: Merge upstream changes (Preserve local files)
        id: check
        run: |
          # 配置用户信息
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # 尝试合并 upstream/main 到当前 main
          # --no-edit 使用默认合并信息
          if git merge upstream/main --no-edit; then
            echo "✅ Merge successful! Local files preserved."
            
            # 检查是否真的发生了新的合并
            # 如果 HEAD 变了，说明有更新
            LOCAL=$(git rev-parse HEAD)
            ORIG_HEAD=$(git rev-parse ORIG_HEAD 2>/dev/null || echo "")
            
            # 简单的判断：如果 merge 成功且没有提示 "Already up to date" (git merge 成功返回 0，但如果没有变化通常不会创建新 commit)
            # 更稳妥的方式是检查 git log 是否有新的 merge commit
            LAST_MSG=$(git log -1 --pretty=%B)
            
            if [[ "$LAST_MSG" == *"Merge"* ]]; then
               echo "Changes detected after merge."
               echo "should_trigger=true" >> $GITHUB_OUTPUT
               
               # 推送合并后的结果
               git config --global http.extraHeader "Authorization: Bearer ${{ secrets.TOKEN }}"
               # 请务必将下方的 'your-fork-owner' 和 'your-repository-name' 替换为您自己的仓库地址
               git remote set-url origin https://github.com/7noemo/qq-farm-automation-bot.git
               git push origin main
               echo "✅ Pushed merged changes to origin."
            else
               echo "No new commits to merge (already up to date)."
               echo "should_trigger=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "❌ Merge conflict detected!"
            echo "Automatic merge failed. Please resolve conflicts manually."
            echo "should_trigger=false" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Extract date from Update.log as version tag
        id: extract
        if: steps.check.outputs.should_trigger == 'true'
        run: |
          # 确认 Update.log 文件位置，根据实际情况调整，此处假设在项目根目录
          LOG_FILE="Update.log"
          if [ ! -f "$LOG_FILE" ]; then
             echo "ERROR: Update.log not found in the root directory."
             exit 1
          fi
          
          FIRST_LINE=$(head -n 1 "$LOG_FILE")
          echo "First line of Update.log: $FIRST_LINE"
          
          # 提取 "YYYY/MM/DD" 格式的日期
          DATE_RAW=$(echo "$FIRST_LINE" | grep -o '[0-9]\{4\}/[0-9]\{2\}/[0-9]\{2\}')
          
          if [ -z "$DATE_RAW" ]; then
            echo "WARNING: Could not extract date from Update.log. Using 'latest'."
            echo "tag=latest" >> $GITHUB_OUTPUT
          else
            # 将 "YYYY/MM/DD" 转换为 "YYYY-MM-DD"
            FORMATTED_DATE=$(echo "$DATE_RAW" | sed 's/\//\-/g')
            echo "Extracted and formatted date: $FORMATTED_DATE"
            echo "tag=$FORMATTED_DATE" >> $GITHUB_OUTPUT
          fi

  trigger-docker:
    needs: sync-and-extract
    if: needs.sync-and-extract.outputs.should_trigger == 'true'
    uses: ./.github/workflows/docker-image.yml
    with:
      # 这里的 'tag' 参数名需要与 docker-image.yml 文件中 'on.workflow_call.inputs' 定义的参数名完全一致
      # 如果 docker-image.yml 中定义的是 'image_version', 'app_version' 或其他名称，请相应修改
      tag: ${{ needs.sync-and-extract.outputs.extracted_tag }}
    secrets: inherit
