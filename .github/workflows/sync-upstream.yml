name: Sync Fork and Trigger Docker Build

# 触发规则：手动触发 + 每30分钟定时触发
on:
  workflow_dispatch:  # 手动触发（保留，方便临时执行）
  schedule:
    - cron: '*/30 * * * *'  # 每30分钟触发一次（UTC时间）

jobs:
  sync-fork:
    runs-on: ubuntu-latest
    outputs:
      need_sync: ${{ steps.check_sync.outputs.need_sync }}
      version_tag: ${{ steps.extract_version.outputs.version_tag }}
    steps:
      # 步骤1：检出当前 Fork 仓库代码（拉取完整历史）
      - name: Checkout Fork Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 步骤2：配置 Git 身份（用于提交同步代码）
      - name: Configure Git Identity
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      # 步骤3：添加上游仓库远程地址并拉取最新代码
      - name: Add Upstream Remote and Fetch
        run: |
          git remote add upstream https://github.com/XyhTender/qq-farm-automation-bot.git
          git fetch upstream

      # 步骤4：检查是否需要同步（对比本地与上游提交）
      - name: Check if Sync is Needed
        id: check_sync
        run: |
          LOCAL_COMMIT=$(git rev-parse HEAD)
          UPSTREAM_COMMIT=$(git rev-parse upstream/main)  # 上游默认分支若为 master 请修改
          
          if [ "$LOCAL_COMMIT" != "$UPSTREAM_COMMIT" ]; then
            echo "need_sync=true" >> $GITHUB_OUTPUT
          else
            echo "need_sync=false" >> $GITHUB_OUTPUT
          fi

      # 步骤5：同步代码到 Fork 仓库（仅需同步时执行，失败不终止）
      - name: Sync Code to Fork
        if: steps.check_sync.outputs.need_sync == 'true'
        continue-on-error: true  # 同步失败不终止任务
        run: |
          git checkout main  # 分支名若为 master 请修改
          git merge upstream/main --no-edit
          git push origin main

      # 步骤6：提取 Update.log 中的版本号（仅需同步时执行）
      - name: Extract Version from Update.log
        id: extract_version
        if: steps.check_sync.outputs.need_sync == 'true'
        run: |
          FIRST_LINE=$(head -n 1 Update.log)
          # 提取 YYYY/MM/DD 并转为 YYYY-MM-DD 格式
          VERSION_TAG=$(echo "$FIRST_LINE" | grep -oE '[0-9]{4}/[0-9]{2}/[0-9]{2}' | sed 's/\//-/g')
          echo "version_tag=$VERSION_TAG" >> $GITHUB_OUTPUT

  # 触发 Docker 构建工作流（需同步且版本号有效时执行）
  trigger-docker-build:
    needs: sync-fork
    if: needs.sync-fork.outputs.need_sync == 'true' && needs.sync-fork.outputs.version_tag != ''
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Docker Image Build Workflow
        uses: benc-uk/workflow-dispatch@v1
        with:
          workflow: docker-image.yml  # 目标 Docker 工作流文件名
          ref: main  # 触发的分支（按需修改）
          inputs: '{"version_tag": "${{ needs.sync-fork.outputs.version_tag }}"}'
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN }}  # 自定义的 TOKEN 密钥
