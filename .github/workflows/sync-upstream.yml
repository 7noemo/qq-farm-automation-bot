name: Compare Files and Trigger Build

on:
  schedule:
    - cron: '*/30 * * * *'   # 每30分钟运行一次
  workflow_dispatch:         # 允许手动触发

env:
  UPSTREAM_REPO: XyhTender/qq-farm-automation-bot
  UPSTREAM_BRANCH: main
  LOCAL_BRANCH: main
  # 启用 Node.js 24（解决 deprecation 警告）
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  compare-and-trigger:
    runs-on: ubuntu-latest
    outputs:
      should_proceed: ${{ steps.compare_files.outputs.should_proceed }}
      new_tag: ${{ steps.extract_tag.outputs.new_tag || '' }}
    steps:
      - name: Checkout current repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.TOKEN }}
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Clone upstream repository to a temporary directory
        run: |
          git clone --depth 1 --branch ${{ env.UPSTREAM_BRANCH }} "https://github.com/${{ env.UPSTREAM_REPO }}.git" /tmp/upstream_repo

      - name: Debug - Show HEAD commits (optional)
        run: |
          echo "=== Local HEAD ==="
          git log -1 --oneline
          echo "=== Upstream HEAD ==="
          git -C /tmp/upstream_repo log -1 --oneline

      - name: Compare file contents between local and upstream
        id: compare_files
        run: |
          # Use rsync with -c (checksum) to compare actual content, not just size/mtime
          if rsync -rnc --delete --exclude='.git' ./ /tmp/upstream_repo/ > /dev/null 2>&1; then
            echo "Error: No file changes detected compared to upstream repository. Exiting with failure."
            exit 1  # 无变更时直接失败退出（非0状态码）
          else
            echo "File changes detected compared to upstream repository. Proceeding."
            echo "should_proceed=true" >> $GITHUB_OUTPUT
          fi

      - name: Sync upstream changes into local repository
        if: steps.compare_files.outcome == 'success'
        run: |
          git remote add upstream https://github.com/${{ env.UPSTREAM_REPO }}.git
          git fetch upstream
          git pull -X theirs upstream ${{ env.UPSTREAM_BRANCH }}

      - name: Push merged changes to local main branch
        if: steps.compare_files.outcome == 'success'
        run: git push origin ${{ env.LOCAL_BRANCH }}

      - name: Extract tag from Update.log (root directory)
        id: extract_tag
        if: steps.compare_files.outcome == 'success'
        run: |
          LOG_FILE="./Update.log"
          echo "Current working directory: $(pwd)"
          ls -la

          if [ -f "$LOG_FILE" ]; then
            echo "Update.log found. Reading first line..."
            NEW_TAG=$(head -n 1 "$LOG_FILE" | grep -oE '[0-9]{4}/[0-9]{2}/[0-9]{2}' | head -1)
            if [ -n "$NEW_TAG" ]; then
              echo "Extracted tag: $NEW_TAG"
              echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT
            else
              echo "Error: No valid date (YYYY/MM/DD) in Update.log. Exiting with failure."
              exit 1  # 提取标签失败也失败退出
            fi
          else
            echo "Error: Update.log NOT FOUND. Exiting with failure."
            exit 1  # 无日志文件也失败退出
          fi

      - name: Print sync summary
        if: steps.compare_files.outcome == 'success'
        run: |
          echo "✅ Repository synced. Tag: ${{ steps.extract_tag.outputs.new_tag }}"

  trigger-docker-build:
    needs: compare-and-trigger
    if: needs.compare-and-trigger.outcome == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Docker Build Workflow
        run: |
          echo "🚀 Triggering docker-image.yml with tag: ${{ needs.compare-and-trigger.outputs.new_tag }}"
          curl -X POST \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: token ${{ secrets.TOKEN }}" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/docker-image.yml/dispatches \
            -d '{"ref":"${{ github.ref_name }}","inputs":{"custom_tag":"${{ needs.compare-and-trigger.outputs.new_tag }}"}}'
