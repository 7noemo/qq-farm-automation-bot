name: Build and Push Multi-Arch Docker Image

on:
  # 手动触发（支持输入自定义标签）
  workflow_dispatch:
    inputs:
      custom_tag:
        description: 'Custom tag for the Docker image (e.g., v1.0.0, release-2026). If not provided, will use git tag or short SHA.'
        required: false
        type: string
  # 被其他工作流调用（接收外部传递的标签）
  workflow_call:
    inputs:
      custom_tag:
        description: 'A custom tag passed from the caller workflow'
        required: false
        type: string
        default: ""

env:
  IMAGE_NAME: ar1995/qq-farm-automation-bot

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Get Image Tags
        id: get_tags
        run: |
          if [[ -n "${{ inputs.custom_tag }}" ]]; then
            VERSION="${{ inputs.custom_tag }}"
          else
            VERSION=$(git describe --tags --always || git rev-parse --short HEAD)
          fi
          
          TAGS="${IMAGE_NAME}:${VERSION},${IMAGE_NAME}:sha-${GITHUB_SHA::7}"
          if [[ -n "${{ inputs.custom_tag }}" ]] || [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAGS="${TAGS},${IMAGE_NAME}:latest"
          fi
          
          echo "Computed tags: $TAGS"
          echo "tags=$TAGS" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Get current datetime
        id: get_datetime
        run: echo "datetime=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./core/Dockerfile
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: ${{ steps.get_tags.outputs.tags }}
          labels: |
            org.opencontainers.image.version=${{ steps.get_tags.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ steps.get_datetime.outputs.datetime }}
            org.opencontainers.image.source=${{ github.repositoryUrl }}
            org.opencontainers.image.ref.name=${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Print pushed tags
        run: |
          echo "Workflow triggered by: ${{ github.event_name }}"
          echo "Version used for tagging: ${{ steps.get_tags.outputs.version }}"
          echo "Successfully pushed tags: ${{ steps.get_tags.outputs.tags }}"
